<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AnimaCine — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0a0a0b;
    --surface:  #111114;
    --card:     #16161a;
    --border:   #2a2a30;
    --gold:     #c9a84c;
    --gold-dim: #8a6e2e;
    --text:     #e8e6df;
    --muted:    #6b6a66;
    --accent:   #e8613a;
    --radius:   10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: .5;
  }
  header {
    padding: 2.5rem 3rem 2rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,11,.92); backdrop-filter: blur(12px);
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.7rem; letter-spacing: .04em; color: var(--gold); }
  .logo span { color: var(--text); font-style: italic; }
  .header-actions { display: flex; gap: 1rem; align-items: center; }
  .user-info { font-size: .85rem; color: var(--muted); }
  .user-info strong { color: var(--gold); }
  .btn-ghost {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: .45rem 1.1rem; border-radius: 50px; cursor: pointer;
    font-family: inherit; font-size: .82rem; letter-spacing: .05em;
    text-transform: uppercase; transition: all .2s;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .btn-solid {
    background: var(--gold); color: #0a0a0b; border: none;
    padding: .45rem 1.2rem; border-radius: 50px; cursor: pointer;
    font-family: inherit; font-size: .82rem; font-weight: 500;
    letter-spacing: .05em; text-transform: uppercase; transition: all .2s;
  }
  .btn-solid:hover { background: #e0bc5e; }
  .hero { padding: 4rem 3rem 3rem; max-width: 680px; animation: fadeUp .6s ease both; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 4vw, 3.2rem); line-height: 1.15; margin-bottom: 1rem; }
  .hero h1 em { color: var(--gold); font-style: italic; }
  .hero p { color: var(--muted); font-size: .95rem; line-height: 1.7; }
  .filters {
    padding: 1.5rem 3rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); animation: fadeUp .6s .1s ease both;
  }
  .search-wrap { flex: 1; min-width: 220px; max-width: 360px; position: relative; }
  .search-wrap svg { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 50px; padding: .55rem 1rem .55rem 2.5rem;
    color: var(--text); font-family: inherit; font-size: .9rem; outline: none; transition: border-color .2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--gold); }
  .filter-chips { display: flex; gap: .5rem; flex-wrap: wrap; }
  .chip {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: .38rem .9rem; border-radius: 50px; cursor: pointer; font-size: .8rem;
    font-family: inherit; transition: all .18s; white-space: nowrap;
  }
  .chip:hover, .chip.active { background: var(--gold); border-color: var(--gold); color: #0a0a0b; font-weight: 500; }
  .sort-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: .45rem .9rem; border-radius: 50px; font-family: inherit; font-size: .8rem;
    cursor: pointer; outline: none; margin-left: auto;
  }
  .results-bar { padding: 1rem 3rem .5rem; font-size: .82rem; color: var(--muted); animation: fadeUp .6s .15s ease both; }
  .results-bar strong { color: var(--gold); }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5rem; padding: 1rem 3rem 3rem; animation: fadeUp .6s .2s ease both;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; cursor: pointer; transition: transform .22s, border-color .22s, box-shadow .22s; position: relative;
  }
  .card:hover { transform: translateY(-5px); border-color: var(--gold-dim); box-shadow: 0 16px 40px rgba(0,0,0,.5); }
  .card-poster-placeholder {
    width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, #1a1a20, #0f0f12);
    display: flex; align-items: center; justify-content: center; font-size: 3.5rem;
  }
  .card-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .card-fav {
    position: absolute; top: .6rem; right: .6rem; background: rgba(10,10,11,.7); border: none;
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; cursor: pointer; backdrop-filter: blur(4px); transition: background .2s; font-size: 1rem;
  }
  .card-fav:hover { background: rgba(201,168,76,.2); }
  .card-fav.active { color: var(--accent); }
  .card-body { padding: .9rem 1rem 1rem; }
  .card-genre { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--gold-dim); margin-bottom: .35rem; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; line-height: 1.3; margin-bottom: .5rem; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; font-size: .78rem; color: var(--muted); }
  .stars { display: flex; gap: 2px; }
  .star { font-size: .85rem; color: var(--border); cursor: pointer; transition: color .15s; border: none; background: none; padding: 0; }
  .star.lit { color: var(--gold); }
  .stars:hover .star { color: var(--gold); }
  .stars .star:hover ~ .star { color: var(--border); }
  .empty { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty h3 { font-family: 'Playfair Display', serif; color: var(--text); margin-bottom: .5rem; }
  /* Loading skeleton */
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius); }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .skeleton-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .skeleton-poster { width: 100%; aspect-ratio: 2/3; }
  .skeleton-body { padding: .9rem 1rem 1rem; }
  .skeleton-line { height: 12px; margin-bottom: .5rem; border-radius: 4px; }
  .skeleton-line.short { width: 60%; }
  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 2rem; }
  .modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp .25s ease; }
  .modal-header { display: flex; justify-content: space-between; align-items: start; padding: 1.5rem 1.5rem .5rem; }
  .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; line-height: 1.3; }
  .modal-close { background: none; border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1rem; flex-shrink: 0; transition: all .2s; }
  .modal-close:hover { border-color: var(--accent); color: var(--accent); }
  .modal-body { padding: 0 1.5rem 1.5rem; }
  .modal-genre { font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; color: var(--gold); margin-bottom: 1rem; }
  .modal-info { display: flex; gap: 2rem; margin-bottom: 1rem; font-size: .85rem; color: var(--muted); }
  .modal-synopsis { font-size: .9rem; line-height: 1.7; color: var(--text); margin-bottom: 1.2rem; }
  .modal-rating-section h4 { font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .5rem; }
  .modal-stars { display: flex; gap: 6px; }
  .modal-stars .star { font-size: 1.4rem; }
  .rating-feedback { font-size: .82rem; color: var(--gold); margin-top: .4rem; min-height: 1.2em; }
  /* Auth modal */
  .auth-modal-body { padding: 1.5rem; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .auth-tab { flex: 1; padding: .6rem; background: none; border: none; color: var(--muted); cursor: pointer; font-family: inherit; font-size: .85rem; transition: all .2s; }
  .auth-tab.active { background: var(--gold); color: #0a0a0b; font-weight: 500; }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .auth-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .7rem 1rem; color: var(--text); font-family: inherit; font-size: .9rem; outline: none; margin-bottom: .8rem; transition: border-color .2s; }
  .auth-input:focus { border-color: var(--gold); }
  .auth-btn { width: 100%; background: var(--gold); color: #0a0a0b; border: none; padding: .7rem; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: .9rem; font-weight: 500; transition: background .2s; margin-top: .3rem; }
  .auth-btn:hover { background: #e0bc5e; }
  .auth-error { color: var(--accent); font-size: .82rem; margin-bottom: .5rem; min-height: 1.1em; }
  /* Toast */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: .6rem 1.4rem; border-radius: 50px; font-size: .85rem; opacity: 0; transition: all .3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 640px) {
    header { padding: 1.2rem; }
    .hero, .filters, .results-bar, .grid { padding-left: 1.2rem; padding-right: 1.2rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Anima<span>Cine</span></div>
  <div class="header-actions">
    <div class="user-info" id="userInfo" style="display:none"></div>
    <button class="btn-ghost" id="btnLogin" onclick="openAuthModal('login')">Iniciar sesión</button>
    <button class="btn-solid" id="btnRegister" onclick="openAuthModal('registro')">Registrarse</button>
    <button class="btn-ghost" id="btnLogout" style="display:none" onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<section class="hero">
  <h1>El mundo de la <em>animación</em>, organizado para ti.</h1>
  <p>Descubre, califica y guarda tus películas animadas favoritas. Un catálogo completo en un solo lugar.</p>
</section>

<div class="filters">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar película..." oninput="applyFilters()"/>
  </div>
  <div class="filter-chips" id="genreChips"></div>
  <select class="sort-select" id="sortSelect" onchange="applyFilters()">
    <option value="title">Ordenar: A–Z</option>
    <option value="year-desc">Año (reciente)</option>
    <option value="year-asc">Año (antiguo)</option>
    <option value="rating">Mejor calificación</option>
  </select>
</div>

<div class="results-bar" id="resultsBar"></div>
<div class="grid" id="movieGrid"></div>

<!-- Modal película -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-genre" id="modalGenre"></div>
      <div class="modal-info">
        <span id="modalYear"></span>
        <span id="modalStudio"></span>
        <span id="modalDuration"></span>
      </div>
      <p class="modal-synopsis" id="modalSynopsis"></p>
      <div class="modal-rating-section">
        <h4>Tu calificación</h4>
        <div class="modal-stars" id="modalStars"></div>
        <div class="rating-feedback" id="ratingFeedback"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal auth -->
<div class="modal-overlay" id="authOverlay" onclick="closeAuthOutside(event)">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h2>Bienvenido a AnimaCine</h2>
      <button class="modal-close" onclick="closeAuth()">✕</button>
    </div>
    <div class="auth-modal-body">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="auth-tab" id="tabRegistro" onclick="switchTab('registro')">Registrarse</button>
      </div>
      <div class="auth-error" id="authError"></div>

      <!-- Login -->
      <div class="auth-form active" id="formLogin">
        <input class="auth-input" type="email" id="loginEmail" placeholder="Correo electrónico"/>
        <input class="auth-input" type="password" id="loginPassword" placeholder="Contraseña"/>
        <button class="auth-btn" onclick="login()">Entrar</button>
      </div>

      <!-- Registro -->
      <div class="auth-form" id="formRegistro">
        <input class="auth-input" type="text" id="regNombre" placeholder="Tu nombre"/>
        <input class="auth-input" type="email" id="regEmail" placeholder="Correo electrónico"/>
        <input class="auth-input" type="password" id="regPassword" placeholder="Contraseña (mín. 6 caracteres)"/>
        <button class="auth-btn" onclick="registro()">Crear cuenta</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIGURACIÓN
// ═══════════════════════════════════════════════
const API = 'http://localhost:3000/api';

const LABELS = ['Malísima','Mala','Regular','Buena','Excelente'];
const EMOJIS = ['🎬','🌊','💀','🤠','🔥','🌳','🐀','🕷️','🏰','🧠','🏍️','🌹','🪲'];

// Estado
const state = {
  peliculas: [],
  generos: [],
  favoritos: new Set(),
  ratings: {},
  activeGenre: 'Todos',
  currentID: null,
  user: null,
  token: null,
};

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
function getToken() { return sessionStorage.getItem('token'); }
function getUser()  { return JSON.parse(sessionStorage.getItem('user') || 'null'); }

function saveSession(token, user) {
  sessionStorage.setItem('token', token);
  sessionStorage.setItem('user', JSON.stringify(user));
  state.token = token;
  state.user  = user;
  updateAuthUI();
}

function logout() {
  sessionStorage.clear();
  state.token = null; state.user = null;
  state.favoritos.clear(); state.ratings = {};
  updateAuthUI();
  renderGrid(state.peliculas);
  showToast('Sesión cerrada');
}

function updateAuthUI() {
  const u = state.user;
  document.getElementById('userInfo').style.display    = u ? 'block' : 'none';
  document.getElementById('btnLogin').style.display    = u ? 'none'  : 'inline-flex';
  document.getElementById('btnRegister').style.display = u ? 'none'  : 'inline-flex';
  document.getElementById('btnLogout').style.display   = u ? 'inline-flex' : 'none';
  if (u) document.getElementById('userInfo').innerHTML = `Hola, <strong>${u.nombre}</strong>`;
}

async function login() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  document.getElementById('authError').textContent = '';

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { document.getElementById('authError').textContent = data.error; return; }
    saveSession(data.token, data.usuario);
    closeAuth();
    await cargarFavoritos();
    renderGrid(state.peliculas);
    showToast(`¡Bienvenido, ${data.usuario.nombre}!`);
  } catch {
    document.getElementById('authError').textContent = 'Error de conexión con el servidor';
  }
}

async function registro() {
  const nombre   = document.getElementById('regNombre').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  document.getElementById('authError').textContent = '';

  try {
    const res  = await fetch(`${API}/auth/registro`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, email, password })
    });
    const data = await res.json();
    if (!res.ok) { document.getElementById('authError').textContent = data.error; return; }
    saveSession(data.token, data.usuario);
    closeAuth();
    showToast('¡Cuenta creada correctamente!');
  } catch {
    document.getElementById('authError').textContent = 'Error de conexión con el servidor';
  }
}

function openAuthModal(tab) { switchTab(tab); document.getElementById('authOverlay').classList.add('open'); }
function closeAuth() { document.getElementById('authOverlay').classList.remove('open'); }
function closeAuthOutside(e) { if (e.target.id === 'authOverlay') closeAuth(); }
function switchTab(tab) {
  document.getElementById('formLogin').classList.toggle('active', tab === 'login');
  document.getElementById('formRegistro').classList.toggle('active', tab === 'registro');
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegistro').classList.toggle('active', tab === 'registro');
  document.getElementById('authError').textContent = '';
}

// ═══════════════════════════════════════════════
//  API CALLS
// ═══════════════════════════════════════════════
async function cargarPeliculas() {
  mostrarSkeletons();
  try {
    const res  = await fetch(`${API}/peliculas`);
    const data = await res.json();
    state.peliculas = data;
    await cargarGeneros();
    applyFilters();
  } catch {
    document.getElementById('movieGrid').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><h3>Sin conexión</h3><p>Asegúrate de que el backend esté corriendo en ${API}</p></div>`;
  }
}

async function cargarGeneros() {
  try {
    const res  = await fetch(`${API}/peliculas/generos/lista`);
    const data = await res.json();
    state.generos = data;
    renderChips();
  } catch {
    // Generar géneros desde las películas como fallback
    const set = new Set(state.peliculas.map(p => p.Genero));
    state.generos = [...set].map((n,i) => ({ GeneroID: i, Nombre: n }));
    renderChips();
  }
}

async function cargarFavoritos() {
  if (!state.token) return;
  try {
    const res  = await fetch(`${API}/peliculas/usuario/favoritos`, {
      headers: { Authorization: `Bearer ${state.token}` }
    });
    const data = await res.json();
    state.favoritos = new Set(data.map(p => p.PeliculaID));
  } catch {}
}

async function toggleFav(e, id) {
  e.stopPropagation();
  if (!state.token) { openAuthModal('login'); showToast('Inicia sesión para guardar favoritos'); return; }
  try {
    const res  = await fetch(`${API}/peliculas/${id}/favorito`, {
      method: 'POST', headers: { Authorization: `Bearer ${state.token}` }
    });
    const data = await res.json();
    if (data.estado === 'agregado') { state.favoritos.add(id); showToast('❤️ Añadido a favoritos'); }
    else                            { state.favoritos.delete(id); showToast('Eliminado de favoritos'); }
    applyFilters();
  } catch { showToast('Error al actualizar favorito'); }
}

async function rateMovie(n) {
  if (!state.token) { openAuthModal('login'); showToast('Inicia sesión para calificar'); return; }
  try {
    await fetch(`${API}/peliculas/${state.currentID}/calificar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${state.token}` },
      body: JSON.stringify({ puntaje: n })
    });
    state.ratings[state.currentID] = n;
    renderModalStars(n);
    document.getElementById('ratingFeedback').textContent = `✓ Calificación guardada: ${LABELS[n-1]}`;
    applyFilters();
  } catch { showToast('Error al guardar calificación'); }
}

// ═══════════════════════════════════════════════
//  RENDERIZADO
// ═══════════════════════════════════════════════
function mostrarSkeletons() {
  document.getElementById('movieGrid').innerHTML = Array(8).fill(`
    <div class="skeleton-card">
      <div class="skeleton skeleton-poster"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line short" style="width:40%;height:10px;margin-bottom:.4rem"></div>
        <div class="skeleton skeleton-line" style="height:14px;margin-bottom:.3rem"></div>
        <div class="skeleton skeleton-line short" style="height:10px"></div>
      </div>
    </div>`).join('');
}

function renderChips() {
  const generos = ['Todos', ...state.generos.map(g => g.Nombre || g.nombre)];
  document.getElementById('genreChips').innerHTML = generos.map(g =>
    `<button class="chip ${g === state.activeGenre ? 'active' : ''}" onclick="setGenre('${g}')">${g}</button>`
  ).join('');
}

function setGenre(g) { state.activeGenre = g; renderChips(); applyFilters(); }

function applyFilters() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const genre = state.activeGenre;

  let list = state.peliculas.filter(m => {
    const genero  = m.Genero  || m.genero  || '';
    const titulo  = m.Titulo  || m.titulo  || '';
    const estudio = m.Estudio || m.estudio || '';
    const matchG  = genre === 'Todos' || genero === genre;
    const matchQ  = titulo.toLowerCase().includes(q) || estudio.toLowerCase().includes(q);
    return matchG && matchQ;
  });

  list.sort((a,b) => {
    const tA = a.Titulo || a.titulo || '';
    const tB = b.Titulo || b.titulo || '';
    const yA = a.Anio   || a.anio   || 0;
    const yB = b.Anio   || b.anio   || 0;
    const rA = a.PromedioCalificacion || 0;
    const rB = b.PromedioCalificacion || 0;
    if (sort === 'title')     return tA.localeCompare(tB);
    if (sort === 'year-desc') return yB - yA;
    if (sort === 'year-asc')  return yA - yB;
    if (sort === 'rating')    return rB - rA;
    return 0;
  });

  renderGrid(list);
  document.getElementById('resultsBar').innerHTML =
    `Mostrando <strong>${list.length}</strong> de ${state.peliculas.length} películas`;
}

function renderGrid(list) {
  const grid = document.getElementById('movieGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><h3>Sin resultados</h3><p>Prueba con otro término o género.</p></div>`;
    return;
  }
  grid.innerHTML = list.map((m, idx) => {
    const id     = m.PeliculaID || m.id;
    const titulo = m.Titulo     || m.titulo;
    const genero = m.Genero     || m.genero;
    const anio   = m.Anio       || m.anio;
    const poster = m.PosterURL  || m.posterURL;
    const prom   = m.PromedioCalificacion || 0;
    const isFav  = state.favoritos.has(id);
    const rating = state.ratings[id] || 0;
    const emoji  = EMOJIS[idx % EMOJIS.length];
    const stars  = [1,2,3,4,5].map(i => `<span class="star ${i <= rating ? 'lit' : ''}">★</span>`).join('');
    const posterHTML = poster
      ? `<img class="card-poster" src="${poster}" alt="${titulo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';

    return `
    <div class="card" onclick="openModal(${id})">
      ${posterHTML}
      <div class="card-poster-placeholder" ${poster ? 'style="display:none"' : ''}>${emoji}</div>
      <button class="card-fav ${isFav ? 'active' : ''}" onclick="toggleFav(event,${id})">${isFav ? '❤️' : '🤍'}</button>
      <div class="card-body">
        <div class="card-genre">${genero}</div>
        <div class="card-title">${titulo}</div>
        <div class="card-meta">
          <span>${anio}</span>
          <div class="stars">${stars}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
//  MODAL DETALLE
// ═══════════════════════════════════════════════
async function openModal(id) {
  state.currentID = id;
  try {
    const res = await fetch(`${API}/peliculas/${id}`);
    const m   = await res.json();
    document.getElementById('modalTitle').textContent    = m.Titulo    || m.titulo;
    document.getElementById('modalGenre').textContent    = m.Genero    || m.genero;
    document.getElementById('modalYear').textContent     = `📅 ${m.Anio || m.anio}`;
    document.getElementById('modalStudio').textContent   = `🏠 ${m.Estudio || m.estudio}`;
    document.getElementById('modalDuration').textContent = `⏱ ${m.Duracion || m.duracion || '—'} min`;
    document.getElementById('modalSynopsis').textContent = m.Sinopsis  || m.sinopsis || '';
    document.getElementById('ratingFeedback').textContent = state.ratings[id] ? `Tu calificación: ${LABELS[state.ratings[id]-1]}` : '';
    renderModalStars(state.ratings[id] || 0);
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  } catch { showToast('Error al cargar detalle'); }
}

function renderModalStars(current) {
  document.getElementById('modalStars').innerHTML = [1,2,3,4,5].map(i => `
    <button class="star ${i <= current ? 'lit' : ''}"
      onmouseenter="previewStars(${i})"
      onmouseleave="renderModalStars(${state.ratings[state.currentID]||0})"
      onclick="rateMovie(${i})">★</button>`).join('');
}

function previewStars(n) {
  document.querySelectorAll('#modalStars .star').forEach((s,i) => s.classList.toggle('lit', i < n));
  document.getElementById('ratingFeedback').textContent = LABELS[n-1];
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }
function closeModalOutside(e) { if (e.target.id === 'modalOverlay') closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeAuth(); } });

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
async function init() {
  state.token = getToken();
  state.user  = getUser();
  updateAuthUI();
  await cargarPeliculas();
  if (state.token) await cargarFavoritos();
}

init();
</script>
